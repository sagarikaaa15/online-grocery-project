<!doctype html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>FreshCart | Grocery Store</title><link rel="stylesheet" href="style.css"></head><body>
<header><a class="brand" href="#">Fresh<span>Cart</span> 🛒</a><label class="search">⌕ <input id="searchInput" placeholder="Search groceries..."></label><button class="cart-button" id="openCart">Cart <b id="cartCount">0</b></button></header>
<main><section class="hero"><div><p class="eyebrow">DELIVERED FRESH TO YOUR DOOR</p><h1>Good food. <em>Good mood.</em></h1><p>Fresh groceries picked with care and delivered today.</p><button class="primary" id="shopNow">Shop groceries</button></div><div class="hero-art">🥬<span>🍊</span><i>🥕</i></div></section><section class="catalog" id="catalog"><div class="section-heading"><div><p class="eyebrow">SHOP BY CATEGORY</p><h2>Everything you need</h2></div><div id="categories" class="categories"></div></div><div id="productGrid" class="product-grid"></div></section></main>
<aside class="cart-panel" id="cartPanel"><div class="cart-head"><h2>Your cart</h2><button class="close" id="closeCart">×</button></div><div id="cartItems" class="cart-items"></div><div class="cart-footer"><div class="total"><span>Total</span><strong id="cartTotal">₹0</strong></div><button class="primary full" id="checkoutButton">Checkout</button></div></aside><div class="overlay" id="overlay"></div>
<dialog id="checkoutDialog"><form id="checkoutForm"><button type="button" class="close dialog-close" id="closeCheckout">×</button><p class="eyebrow">FINAL STEP</p><h2>Checkout</h2><label>Full name<input required name="customerName" placeholder="Your name"></label><label>Phone number<input required name="phone" pattern="[0-9]{10}" placeholder="10-digit mobile number"></label><label>Delivery address<textarea required name="address" placeholder="House / street / city"></textarea></label><label>Payment method<select required name="paymentMethod"><option>Cash on Delivery</option><option>UPI (Demo)</option><option>Card (Demo)</option></select></label><button class="primary full" type="submit">Place order</button><p class="form-message" id="formMessage"></p></form></dialog>
<template id="productTemplate"><article class="product-card"><div class="product-image"></div><div class="product-info"><span class="category"></span><h3></h3><p class="unit"></p><div class="product-bottom"><strong></strong><button class="add">Add +</button></div><small class="stock"></small></div></article></template><script src="app.js"></script></body></html>
